<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест на плоскостопие — Ortoma Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Mulish:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d0d;
    --cream: #f5f0e8;
    --accent: #c8f03c;
    --muted: #888;
    --green: #3cd68a;
    --red: #ff4d4d;
    --orange: #ff9a3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); color: var(--ink); font-family: 'Mulish', sans-serif; min-height: 100vh; }

  .topnav {
    background: var(--ink); color: var(--accent);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 52px; position: sticky; top: 0; z-index: 50;
  }
  .topnav-logo { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.2em; }
  .topnav-tabs { display: flex; gap: 4px; }
  .tab-btn {
    background: none; border: none; color: rgba(255,255,255,0.5);
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; padding: 8px 16px; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.18s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { display: none; }
  .panel.active { display: block; }

  .editor-wrap { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 52px); }

  .editor-sidebar {
    background: white; border-right: 1px solid #e8e4da;
    overflow-y: auto; max-height: calc(100vh - 52px); position: sticky; top: 52px;
  }

  .editor-main { padding: 28px; overflow-y: auto; }

  .sidebar-section { border-bottom: 1px solid #f0ece2; }
  .sidebar-section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; cursor: pointer; background: #fafaf7; user-select: none;
  }
  .sidebar-section-header:hover { background: #f2efe6; }
  .sidebar-section-title {
    font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
  }

  .step-list { padding: 8px 0; }
  .step-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; cursor: pointer; transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .step-item:hover { background: #f5f0e8; }
  .step-item.selected { background: #f5f0e8; border-left-color: var(--ink); }
  .step-num {
    width: 24px; height: 24px; background: var(--ink); color: var(--accent);
    font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .step-item-text { font-size: 12px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* step thumb in sidebar */
  .step-thumb {
    width: 32px; height: 32px; object-fit: cover; flex-shrink: 0;
    border: 1px solid #e0dbd0;
  }
  .step-thumb-placeholder {
    width: 32px; height: 32px; background: #f0ece2;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  /* EDITOR FIELDS */
  .editor-section {
    background: white; border: 1px solid #e8e4da;
    padding: 20px; margin-bottom: 16px;
  }
  .editor-section-title {
    font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
  }
  .field-row { margin-bottom: 14px; }
  .field-label { font-size: 12px; font-weight: 700; color: #555; margin-bottom: 5px; display: block; }
  .field-input, .field-textarea {
    width: 100%; border: 1.5px solid #e0dbd0; padding: 9px 12px;
    font-family: 'Mulish', sans-serif; font-size: 14px; color: var(--ink);
    background: #fafaf7; outline: none; transition: border 0.15s; resize: vertical;
  }
  .field-input:focus, .field-textarea:focus { border-color: var(--ink); background: white; }

  /* IMAGE UPLOAD */
  .img-upload-area {
    border: 2px dashed #d0cbbf;
    padding: 0;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
    background: #fafaf7;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-upload-area:hover { border-color: var(--ink); background: #f0ece2; }
  .img-upload-area.has-image { border-style: solid; border-color: var(--ink); }

  .img-upload-preview {
    width: 100%; height: 200px; object-fit: cover; display: block;
  }

  .img-upload-placeholder {
    padding: 32px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .img-upload-icon { font-size: 36px; }
  .img-upload-text { font-size: 13px; font-weight: 600; color: #777; }
  .img-upload-sub { font-size: 11px; color: var(--muted); }

  .img-upload-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center; gap: 12px;
  }
  .img-upload-area.has-image:hover .img-upload-overlay { display: flex; }

  .img-btn {
    background: white; color: var(--ink);
    font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700;
    padding: 8px 14px; border: none; cursor: pointer; letter-spacing: 0.08em;
    text-transform: uppercase; transition: all 0.15s;
  }
  .img-btn:hover { background: var(--accent); }
  .img-btn.danger { background: var(--red); color: white; }
  .img-btn.danger:hover { background: #cc0000; }

  .img-file-input { display: none; }

  /* ANSWER EDITOR */
  .answer-editor { border: 1.5px solid #e0dbd0; padding: 14px; margin-bottom: 10px; background: #fafaf7; }
  .answer-editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .answer-label-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; }
  .answer-label-tag.a0 { background: #e8faf2; color: #1a8a52; }
  .answer-label-tag.a1 { background: #fff3e0; color: #d4700a; }
  .answer-label-tag.a2 { background: #ffe5e5; color: #cc2020; }
  .score-badge { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; padding: 4px 10px; background: var(--ink); color: var(--accent); }

  .result-editor { border: 1.5px solid #e0dbd0; padding: 16px; margin-bottom: 14px; }
  .result-editor.r0 { border-left: 4px solid var(--green); }
  .result-editor.r1 { border-left: 4px solid var(--orange); }
  .result-editor.r2 { border-left: 4px solid var(--red); }

  .btn-save {
    background: var(--ink); color: var(--accent);
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; padding: 12px 28px; border: none; cursor: pointer;
    text-transform: uppercase; transition: all 0.18s; width: 100%; margin-top: 4px;
  }
  .btn-save:hover { background: #333; }
  .btn-preview {
    background: var(--accent); color: var(--ink);
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; padding: 12px 28px; border: none; cursor: pointer;
    text-transform: uppercase; width: 100%; margin-top: 8px; transition: opacity 0.18s;
  }
  .btn-preview:hover { opacity: 0.85; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink); color: var(--accent);
    font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700;
    padding: 14px 24px; z-index: 999;
    transform: translateY(80px); opacity: 0; transition: all 0.3s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* PREVIEW */
  #panel-preview { max-width: 420px; margin: 0 auto; padding: 40px 24px; }
  .screen { display: none; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  .pv-logo { font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 40px; text-transform: uppercase; }
  .pv-foot { width: 90px; height: 90px; margin: 0 auto 24px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-8px) rotate(2deg)} }
  .pv-title { font-family: 'Unbounded', sans-serif; font-size: clamp(22px,5.5vw,30px); font-weight: 900; line-height: 1.1; margin-bottom: 12px; text-align: center; }
  .pv-title span { background: var(--accent); padding: 2px 6px; }
  .pv-sub { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 32px; font-weight: 300; text-align: center; }
  .pv-start { background: var(--ink); color: var(--accent); font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; padding: 16px 40px; border: none; cursor: pointer; text-transform: uppercase; clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); transition: all 0.2s; }
  .pv-start:hover { background: var(--accent); color: var(--ink); }
  .pv-count { margin-top: 16px; font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }

  .pv-step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; width: 100%; }
  .pv-step-logo { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.2em; }
  .pv-counter { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); }
  .pv-progress { height: 4px; background: rgba(0,0,0,0.1); margin-bottom: 28px; overflow: hidden; width: 100%; }
  .pv-progress-fill { height: 100%; background: var(--ink); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

  /* Step visual — supports both image and emoji */
  .pv-visual {
    width: 100%; height: 200px; background: var(--ink);
    margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .pv-visual-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .pv-visual-emoji { font-size: 64px; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .pv-visual-tag {
    position: absolute; bottom: 10px; right: 10px;
    background: var(--accent); color: var(--ink);
    font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 700;
    padding: 3px 8px; letter-spacing: 0.1em; text-transform: uppercase;
  }

  .pv-question { font-family: 'Unbounded', sans-serif; font-size: clamp(15px,3.8vw,19px); font-weight: 700; line-height: 1.3; margin-bottom: 8px; width: 100%; }
  .pv-hint { font-size: 13px; color: #666; font-weight: 300; line-height: 1.5; margin-bottom: 20px; padding-left: 10px; border-left: 2px solid var(--accent); width: 100%; }
  .pv-answers { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .pv-answer { background: white; border: 2px solid rgba(0,0,0,0.08); padding: 14px 16px; text-align: left; cursor: pointer; font-family: 'Mulish', sans-serif; font-size: 14px; font-weight: 600; color: var(--ink); transition: all 0.18s; display: flex; align-items: center; gap: 12px; }
  .pv-answer:hover { border-color: var(--ink); background: var(--ink); color: white; transform: translateX(4px); }
  .pv-answer-icon { font-size: 18px; flex-shrink: 0; }

  .pv-result-badge { font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; background: var(--ink); color: var(--accent); padding: 6px 16px; margin-bottom: 24px; }
  .pv-result-icon { font-size: 72px; margin-bottom: 16px; animation: resultPop 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes resultPop { from{transform:scale(0) rotate(-20deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
  .pv-result-title { font-family: 'Unbounded', sans-serif; font-size: clamp(18px,4.5vw,24px); font-weight: 900; line-height: 1.2; margin-bottom: 12px; text-align: center; }
  .pv-result-title.green { color: #1a8a52; }
  .pv-result-title.orange { color: #d4700a; }
  .pv-result-title.red { color: #cc2020; }
  .pv-result-desc { font-size: 14px; color: #555; line-height: 1.7; font-weight: 300; margin-bottom: 24px; max-width: 340px; text-align: center; }
  .pv-score { display: flex; justify-content: center; gap: 6px; margin-bottom: 24px; }
  .pv-score-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(0,0,0,0.1); }
  .pv-score-dot.filled { background: var(--ink); }
  .pv-result-cta { background: var(--ink); color: var(--accent); font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; padding: 15px 28px; border: none; cursor: pointer; text-transform: uppercase; width: 100%; clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%); margin-bottom: 10px; transition: all 0.2s; }
  .pv-result-cta:hover { background: var(--accent); color: var(--ink); }
  .pv-restart { background: none; border: none; font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
  .pv-footer { margin-top: 24px; font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.25em; color: rgba(0,0,0,0.2); }

  @media (max-width: 640px) {
    .editor-wrap { grid-template-columns: 1fr; }
    .editor-sidebar { position: static; max-height: none; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <span class="topnav-logo">ORTOMA EDITOR</span>
  <div class="topnav-tabs">
    <button class="tab-btn active" onclick="switchTab('editor')">✏️ Редактор</button>
    <button class="tab-btn" onclick="switchTab('preview')">▶ Превью</button>
  </div>
</nav>

<!-- EDITOR -->
<div id="panel-editor" class="panel active">
  <div class="editor-wrap">
    <div class="editor-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <span class="sidebar-section-title">Вопросы</span>
        </div>
        <div class="step-list" id="step-list"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-header" onclick="selectResults()">
          <span class="sidebar-section-title">Результаты</span>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-header" onclick="selectIntro()">
          <span class="sidebar-section-title">Заголовок теста</span>
        </div>
      </div>
    </div>
    <div class="editor-main" id="editor-main"></div>
  </div>
</div>

<!-- PREVIEW -->
<div id="panel-preview" class="panel">
  <div class="screen active" id="screen-intro">
    <div class="pv-logo">Ortoma × Ортопедия</div>
    <div class="pv-foot">
      <svg viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg" width="90" height="90">
        <ellipse cx="55" cy="115" rx="38" ry="20" fill="#0d0d0d"/>
        <path d="M25 85 Q20 60 28 40 Q35 20 50 15 Q65 10 72 22 Q78 33 75 50 Q72 65 68 80 Q64 95 55 105 Q45 115 35 112 Q25 109 25 85Z" fill="#0d0d0d"/>
        <ellipse cx="78" cy="20" rx="8" ry="10" fill="#c8f03c"/>
        <ellipse cx="88" cy="30" rx="7" ry="9" fill="#c8f03c"/>
        <ellipse cx="93" cy="44" rx="6" ry="8" fill="#c8f03c"/>
        <ellipse cx="90" cy="58" rx="6" ry="7" fill="#c8f03c"/>
        <ellipse cx="84" cy="70" rx="6" ry="7" fill="#c8f03c"/>
      </svg>
    </div>
    <h1 class="pv-title" id="pv-title">Есть ли у тебя <span>плоскостопие?</span></h1>
    <p class="pv-sub" id="pv-sub">Пройди 5 простых вопросов.<br>Без оборудования — прямо сейчас.</p>
    <button class="pv-start" onclick="startPreview()" id="pv-start-btn">Начать тест →</button>
    <p class="pv-count" id="pv-count">5 вопросов · 2 минуты</p>
    <div class="pv-footer">ORTOMA.UZ</div>
  </div>

  <div class="screen" id="screen-step">
    <div class="pv-step-header">
      <span class="pv-step-logo">ORTOMA</span>
      <span class="pv-counter" id="pv-counter">1 / 5</span>
    </div>
    <div class="pv-progress"><div class="pv-progress-fill" id="pv-prog" style="width:20%"></div></div>
    <div class="pv-visual" id="pv-visual">
      <span class="pv-visual-emoji" id="pv-emoji">🦶</span>
      <span class="pv-visual-tag" id="pv-tag">Вопрос</span>
    </div>
    <h2 class="pv-question" id="pv-question"></h2>
    <p class="pv-hint" id="pv-hint"></p>
    <div class="pv-answers" id="pv-answers"></div>
  </div>

  <div class="screen" id="screen-result" style="text-align:center">
    <div class="pv-result-badge" id="pv-rbadge">Результат</div>
    <div class="pv-result-icon" id="pv-ricon">🎉</div>
    <h2 class="pv-result-title" id="pv-rtitle"></h2>
    <p class="pv-result-desc" id="pv-rdesc"></p>
    <div class="pv-score" id="pv-score"></div>
    <button class="pv-result-cta" id="pv-rcta" onclick="openTelegram()"></button>
    <button class="pv-restart" onclick="restartPreview()">Пройти тест заново</button>
    <div class="pv-footer">ORTOMA.UZ</div>
  </div>
</div>

<div class="toast" id="toast">✓ Сохранено</div>

<script>
// ====== DATA ======
let data = {
  intro: { title: "Есть ли у тебя плоскостопие?", subtitle: "Пройди 5 простых вопросов.\nБез оборудования — прямо сейчас.", cta: "Начать тест →", count: "5 вопросов · 2 минуты" },
  steps: [
    { emoji:"💧", tag:"Тест с водой", question:"Намочи ступню и встань на бумагу. Что видишь?", hint:"Встань ровно, обе ноги на весу. Посмотри на форму отпечатка.", image: null,
      answers:[{icon:"✅",text:"Чёткий «перешеек» — середина стопы почти не касается",score:0},{icon:"⚠️",text:"Перешеек узкий, но есть",score:1},{icon:"🔴",text:"Вся стопа отпечаталась сплошным пятном",score:2}]},
    { emoji:"🌅", tag:"Симптомы", question:"Болит ли стопа или пятка утром после первых шагов?", hint:"Особенно — сразу как встаёшь с кровати.", image: null,
      answers:[{icon:"✅",text:"Нет, всё нормально",score:0},{icon:"⚠️",text:"Иногда, через пару минут проходит",score:1},{icon:"🔴",text:"Да, каждое утро — больно идти",score:2}]},
    { emoji:"👟", tag:"Обувь", question:"Посмотри на подошву своих кроссовок. Как они стёрты?", hint:"Неравномерный износ — признак нарушения биомеханики стопы.", image: null,
      answers:[{icon:"✅",text:"Равномерно по всей подошве",score:0},{icon:"⚠️",text:"Чуть больше с внутренней стороны",score:1},{icon:"🔴",text:"Сильно стёрто с внутренней стороны / по краям",score:2}]},
    { emoji:"🦵", tag:"Осанка", question:"Попроси кого-нибудь посмотреть на тебя сзади. Как стоят лодыжки?", hint:"Или сфотографируй себя сзади, стоя ровно.", image: null,
      answers:[{icon:"✅",text:"Ровно, ахиллесы идут прямо вниз",score:0},{icon:"⚠️",text:"Слегка наклоняются внутрь",score:1},{icon:"🔴",text:"Сильно заваливаются внутрь (пронация)",score:2}]},
    { emoji:"😓", tag:"Усталость", question:"Как чувствуются ноги после 2–3 часов ходьбы?", hint:"Прогулка, торговый центр, экскурсия.", image: null,
      answers:[{icon:"✅",text:"Нормально, лёгкая усталость",score:0},{icon:"⚠️",text:"Гудят, хочется сесть",score:1},{icon:"🔴",text:"Сильная боль, отёк, невозможно долго ходить",score:2}]}
  ],
  results: [
    { badge:"Отличный результат", icon:"🟢", title:"Всё хорошо!", titleClass:"green", desc:"По твоим ответам — стопа в норме. Рекомендуем раз в год делать профилактическое сканирование.", cta:"Записаться на профилактику" },
    { badge:"Есть признаки", icon:"🟡", title:"Начальные признаки плоскостопия", titleClass:"orange", desc:"Несколько симптомов присутствуют. На ранней стадии индивидуальные стельки помогают за 2–3 месяца.", cta:"Записаться на сканирование" },
    { badge:"Нужна консультация", icon:"🔴", title:"Высокая вероятность плоскостопия", titleClass:"red", desc:"Твои ответы указывают на выраженное плоскостопие. Без коррекции это влияет на колени и позвоночник.", cta:"Записаться срочно" }
  ]
};

let selectedStep = 0;
let selectedMode = 'step';

// ====== TABS ======
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='editor')||(i===1&&tab==='preview')));
  document.getElementById('panel-editor').classList.toggle('active', tab==='editor');
  document.getElementById('panel-preview').classList.toggle('active', tab==='preview');
  if (tab==='preview') initPreview();
}

// ====== SIDEBAR ======
function renderSidebar() {
  const list = document.getElementById('step-list');
  list.innerHTML = '';
  data.steps.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'step-item' + (selectedMode==='step'&&selectedStep===i?' selected':'');
    const thumb = s.image
      ? `<img class="step-thumb" src="${s.image}" alt="">`
      : `<div class="step-thumb-placeholder">${s.emoji}</div>`;
    el.innerHTML = `${thumb}<div class="step-num">${i+1}</div><span class="step-item-text">${s.question.slice(0,30)}…</span>`;
    el.onclick = () => { selectedStep=i; selectedMode='step'; renderSidebar(); renderEditor(); };
    list.appendChild(el);
  });
}

function selectResults() { selectedMode='results'; renderSidebar(); renderEditor(); }
function selectIntro() { selectedMode='intro'; renderSidebar(); renderEditor(); }

// ====== EDITOR ======
function renderEditor() {
  const main = document.getElementById('editor-main');
  if (selectedMode==='step') renderStepEditor(main, selectedStep);
  else if (selectedMode==='results') renderResultsEditor(main);
  else renderIntroEditor(main);
}

function field(label, id, value, type='input') {
  if (type==='textarea') return `<div class="field-row"><label class="field-label">${label}</label><textarea class="field-textarea" id="${id}" rows="3">${value}</textarea></div>`;
  return `<div class="field-row"><label class="field-label">${label}</label><input class="field-input" id="${id}" value="${String(value).replace(/"/g,'&quot;')}"></div>`;
}

function renderStepEditor(main, i) {
  const s = data.steps[i];
  const hasImage = !!s.image;

  main.innerHTML = `
    <div class="editor-section">
      <div class="editor-section-title">Вопрос ${i+1} из ${data.steps.length}</div>

      <!-- IMAGE UPLOAD -->
      <div class="field-row">
        <label class="field-label">Фото для вопроса</label>
        <div class="img-upload-area ${hasImage?'has-image':''}" id="upload-area-${i}" onclick="triggerUpload(${i})">
          ${hasImage
            ? `<img class="img-upload-preview" src="${s.image}" alt="фото вопроса" id="preview-img-${i}">
               <div class="img-upload-overlay">
                 <button class="img-btn" onclick="event.stopPropagation();triggerUpload(${i})">Заменить</button>
                 <button class="img-btn danger" onclick="event.stopPropagation();removeImage(${i})">Удалить</button>
               </div>`
            : `<div class="img-upload-placeholder">
                 <div class="img-upload-icon">📷</div>
                 <div class="img-upload-text">Нажми чтобы загрузить фото</div>
                 <div class="img-upload-sub">JPG, PNG, WEBP · до 10 МБ</div>
               </div>`
          }
        </div>
        <input type="file" class="img-file-input" id="file-input-${i}" accept="image/*" onchange="handleImageUpload(event, ${i})">
        ${hasImage ? '<p style="font-size:11px;color:var(--muted);margin-top:6px;">✓ Фото загружено — будет показано вместо emoji</p>' : '<p style="font-size:11px;color:var(--muted);margin-top:6px;">Если фото не загружено — показывается emoji</p>'}
      </div>

      ${field('Emoji (если нет фото)', `tag_emoji_${i}`, s.emoji)}
      ${field('Тег', `tag_${i}`, s.tag)}
      ${field('Вопрос', `q_${i}`, s.question, 'textarea')}
      ${field('Подсказка', `hint_${i}`, s.hint, 'textarea')}
    </div>

    <div class="editor-section">
      <div class="editor-section-title">Варианты ответов</div>
      ${s.answers.map((a,j) => `
        <div class="answer-editor">
          <div class="answer-editor-header">
            <span class="answer-label-tag a${j}">${j===0?'✅ Норма':j===1?'⚠️ Умеренно':'🔴 Выражено'}</span>
            <span class="score-badge">Балл: ${a.score}</span>
          </div>
          ${field('Текст ответа', `ans_${i}_${j}`, a.text)}
        </div>
      `).join('')}
    </div>

    <button class="btn-save" onclick="saveStep(${i})">Сохранить вопрос</button>
    <button class="btn-preview" onclick="switchTab('preview')">▶ Открыть превью</button>
  `;
}

function renderResultsEditor(main) {
  const labels = ['Норма (0–2 балла)','Начальная стадия (3–6 баллов)','Выраженное (7–10 баллов)'];
  main.innerHTML = `
    ${data.results.map((r,i) => `
      <div class="result-editor r${i}">
        <div class="editor-section-title">${labels[i]}</div>
        ${field('Бейдж', `rbadge_${i}`, r.badge)}
        ${field('Иконка (emoji)', `ricon_${i}`, r.icon)}
        ${field('Заголовок', `rtitle_${i}`, r.title)}
        ${field('Описание', `rdesc_${i}`, r.desc, 'textarea')}
        ${field('Текст кнопки', `rcta_${i}`, r.cta)}
      </div>
    `).join('')}
    <button class="btn-save" onclick="saveResults()">Сохранить результаты</button>
    <button class="btn-preview" onclick="switchTab('preview')">▶ Открыть превью</button>
  `;
}

function renderIntroEditor(main) {
  main.innerHTML = `
    <div class="editor-section">
      <div class="editor-section-title">Заголовок теста</div>
      ${field('Заголовок', 'intro_title', data.intro.title)}
      ${field('Подзаголовок', 'intro_sub', data.intro.subtitle, 'textarea')}
      ${field('Текст кнопки', 'intro_cta', data.intro.cta)}
      ${field('Счётчик вопросов', 'intro_count', data.intro.count)}
    </div>
    <button class="btn-save" onclick="saveIntro()">Сохранить заголовок</button>
    <button class="btn-preview" onclick="switchTab('preview')">▶ Открыть превью</button>
  `;
}

// ====== IMAGE UPLOAD ======
function triggerUpload(i) {
  document.getElementById(`file-input-${i}`).click();
}

function handleImageUpload(event, i) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    data.steps[i].image = e.target.result;
    renderSidebar();
    renderEditor();
    showToast('Фото загружено');
  };
  reader.readAsDataURL(file);
}

function removeImage(i) {
  data.steps[i].image = null;
  renderSidebar();
  renderEditor();
  showToast('Фото удалено');
}

// ====== SAVE ======
function saveStep(i) {
  const s = data.steps[i];
  s.emoji = document.getElementById(`tag_emoji_${i}`).value;
  s.tag = document.getElementById(`tag_${i}`).value;
  s.question = document.getElementById(`q_${i}`).value;
  s.hint = document.getElementById(`hint_${i}`).value;
  s.answers.forEach((a,j) => { a.text = document.getElementById(`ans_${i}_${j}`).value; });
  renderSidebar();
  showToast('Вопрос сохранён');
}

function saveResults() {
  data.results.forEach((r,i) => {
    r.badge = document.getElementById(`rbadge_${i}`).value;
    r.icon = document.getElementById(`ricon_${i}`).value;
    r.title = document.getElementById(`rtitle_${i}`).value;
    r.desc = document.getElementById(`rdesc_${i}`).value;
    r.cta = document.getElementById(`rcta_${i}`).value;
  });
  showToast('Результаты сохранены');
}

function saveIntro() {
  data.intro.title = document.getElementById('intro_title').value;
  data.intro.subtitle = document.getElementById('intro_sub').value;
  data.intro.cta = document.getElementById('intro_cta').value;
  data.intro.count = document.getElementById('intro_count').value;
  showToast('Заголовок сохранён');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ====== PREVIEW ======
let pvStep = 0, pvScore = 0;

function initPreview() {
  document.getElementById('pv-title').innerHTML = data.intro.title.replace(/(плоскостопие\??)/i, '<span>$1</span>');
  document.getElementById('pv-sub').innerHTML = data.intro.subtitle.replace(/\n/g,'<br>');
  document.getElementById('pv-start-btn').textContent = data.intro.cta;
  document.getElementById('pv-count').textContent = data.intro.count;
  showPvScreen('screen-intro');
}

function startPreview() {
  pvStep=0; pvScore=0;
  showPvScreen('screen-step');
  renderPvStep();
}

function showPvScreen(id) {
  document.querySelectorAll('#panel-preview .screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderPvStep() {
  const s = data.steps[pvStep];
  document.getElementById('pv-counter').textContent = `${pvStep+1} / ${data.steps.length}`;
  document.getElementById('pv-prog').style.width = `${((pvStep+1)/data.steps.length)*100}%`;

  // Visual: photo or emoji
  const visual = document.getElementById('pv-visual');
  if (s.image) {
    visual.innerHTML = `<img class="pv-visual-img" src="${s.image}" alt=""><span class="pv-visual-tag">${s.tag}</span>`;
  } else {
    const emoji = document.getElementById('pv-emoji') || (() => {
      const span = document.createElement('span');
      span.id = 'pv-emoji';
      span.className = 'pv-visual-emoji';
      return span;
    })();
    visual.innerHTML = `<span class="pv-visual-emoji" id="pv-emoji">${s.emoji}</span><span class="pv-visual-tag" id="pv-tag">${s.tag}</span>`;
    const em = document.getElementById('pv-emoji');
    em.style.animation='none'; void em.offsetWidth; em.style.animation='popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';
  }

  document.getElementById('pv-question').textContent = s.question;
  document.getElementById('pv-hint').textContent = s.hint;
  const c = document.getElementById('pv-answers');
  c.innerHTML = '';
  s.answers.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'pv-answer';
    btn.innerHTML = `<span class="pv-answer-icon">${a.icon}</span><span>${a.text}</span>`;
    btn.onclick = () => { pvScore+=a.score; pvStep++; pvStep<data.steps.length?renderPvStep():showPvResult(); };
    c.appendChild(btn);
  });
}

function showPvResult() {
  let r = data.results[2];
  if (pvScore<=2) r=data.results[0];
  else if (pvScore<=6) r=data.results[1];
  document.getElementById('pv-rbadge').textContent = r.badge;
  document.getElementById('pv-ricon').textContent = r.icon;
  const rt = document.getElementById('pv-rtitle');
  rt.textContent=r.title; rt.className=`pv-result-title ${r.titleClass}`;
  document.getElementById('pv-rdesc').textContent = r.desc;
  document.getElementById('pv-rcta').textContent = r.cta;
  const sc = document.getElementById('pv-score');
  sc.innerHTML='';
  const max=data.steps.length*2;
  for(let i=0;i<max;i++){const d=document.createElement('div');d.className='pv-score-dot'+(i<pvScore?' filled':'');sc.appendChild(d);}
  showPvScreen('screen-result');
}

function openTelegram() {
  const messages = [
    'Привет! Прошёл тест на плоскостопие — результат: всё хорошо. Хочу записаться на профилактическое сканирование стопы. В какой день можно прийти?',
    'Привет! Прошёл тест на плоскостопие — результат: есть начальные признаки. Хочу записаться на сканирование стопы. В какой день можно прийти?',
    'Привет! Прошёл тест на плоскостопие — результат: высокая вероятность плоскостопия. Хочу срочно записаться на сканирование стопы. В какой день можно прийти?'
  ];
  let idx = 0;
  if (pvScore <= 2) idx = 0;
  else if (pvScore <= 6) idx = 1;
  else idx = 2;
  const text = encodeURIComponent(messages[idx]);
  window.open(`https://t.me/podiatr_uz?text=${text}`, '_blank');
}

function restartPreview() { startPreview(); }

// INIT
renderSidebar();
renderEditor();
</script>
</body>
</html>
